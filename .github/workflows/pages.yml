name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p _site
          cp -R site/. _site/
          cat >> _site/README_DEPLOY.txt <<'EOF'
          Public marketing site. For the live companion (prompt + Blender/OpenSCAD),
          clone the repo and run: .venv/bin/python -m backend
          then open http://127.0.0.1:8010
          EOF
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
