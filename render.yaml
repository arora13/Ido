services:
  - type: web
    name: ido-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: CAD_AGENT_DEMO_MODE
        value: "true"
      - key: CAD_AGENT_PROVIDER
        value: deterministic
      - key: CAD_AGENT_LOG_LEVEL
        value: INFO
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_MODEL_ID
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: GUILD_TRACE_ENABLED
        value: "false"
      - key: GUILD_OTLP_ENDPOINT
        sync: false
      - key: CLICKHOUSE_ENABLED
        value: "false"
      - key: CLICKHOUSE_HOST
        sync: false
      - key: COMPOSIO_ENABLED
        value: "false"
      - key: AIRBYTE_ENABLED
        value: "false"
